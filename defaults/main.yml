---
# Project source code URL: https://github.com/google/cadvisor

cadvisor_enabled: true

cadvisor_identifier: cadvisor
cadvisor_base_path: "/{{ cadvisor_identifier }}"

# renovate: datasource=docker depName=gcr.io/cadvisor/cadvisor versioning=semver
cadvisor_version: v0.55.1

cadvisor_uid: ""
cadvisor_gid: ""

# The hostname at which cAdvisor is served.
cadvisor_hostname: ""

# The path at which cAdvisor is served.
cadvisor_path_prefix: /

cadvisor_container_image: "{{ cadvisor_container_image_registry_prefix }}cadvisor/cadvisor:{{ cadvisor_container_image_tag }}"
cadvisor_container_image_tag: "{{ cadvisor_version }}"
cadvisor_container_image_registry_prefix: "{{ cadvisor_container_image_registry_prefix_upstream }}"
cadvisor_container_image_registry_prefix_upstream: "{{ cadvisor_container_image_registry_prefix_upstream_default }}"
cadvisor_container_image_registry_prefix_upstream_default: gcr.io/

# The base container network
#
# Official recommendations are to run this container with `--net=host`,
# but we don't do that, since it:
# - exposes the metrics web server way too publicly (we'd potentially like to add HTTP Basic authentication, etc.)
# - or listens on a loopback interface only (--net=host and 127.0.0.1:9100), which is not reachable from a local Prometheus container
#
# Not using `--net=host` means that our network statistic reports are likely broken (inaccurate),
# because cAdvisor can't see all interfaces, etc.
# For now, we'll live with that, until someone develops a better solution.
cadvisor_container_network: "{{ cadvisor_identifier }}"

# Control if the container network is deleted on uninstalling.
cadvisor_container_network_deletion_enabled: true

# Specify how the container publishes its HTTP port (as defined by `cadvisor_container_http_port`).
#
# Takes an "<ip>:<port>" or "<port>" value (e.g. "127.0.0.1:2586"), or empty string to not expose.
cadvisor_container_http_host_bind_port: ""

# A port number in the container
cadvisor_container_http_port: 8080

# A list of additional container networks that the container would be connected to.
# The role does not create these networks, so make sure they already exist.
# Use this to expose this container to another reverse proxy, which runs in a different container network.
cadvisor_container_additional_networks: "{{ (cadvisor_container_additional_networks_auto + cadvisor_container_additional_networks_custom) | unique }}"
cadvisor_container_additional_networks_auto: []
cadvisor_container_additional_networks_custom: []

# cadvisor_container_labels_traefik_enabled controls whether labels to assist a Traefik reverse-proxy will be attached to the container.
# See `../templates/labels.j2` for details.
#
# To inject your own other container labels, see `cadvisor_container_labels_additional_labels_custom`.
cadvisor_container_labels_traefik_enabled: "{{ true if cadvisor_hostname else false }}"
cadvisor_container_labels_traefik_docker_network: "{{ cadvisor_container_network }}"
cadvisor_container_labels_traefik_hostname: "{{ cadvisor_hostname }}"
# The path prefix must either be `/` or not end with a slash (e.g. `/cadvisor`).
cadvisor_container_labels_traefik_path_prefix: "{{ cadvisor_path_prefix }}"
cadvisor_container_labels_traefik_rule: "Host(`{{ cadvisor_container_labels_traefik_hostname }}`){% if cadvisor_container_labels_traefik_path_prefix != '/' %} && PathPrefix(`{{ cadvisor_container_labels_traefik_path_prefix }}`){% endif %}"
cadvisor_container_labels_traefik_priority: 0
cadvisor_container_labels_traefik_entrypoints: web-secure
cadvisor_container_labels_traefik_tls: "{{ cadvisor_container_labels_traefik_entrypoints != 'web' }}"
cadvisor_container_labels_traefik_tls_certResolver: default  # noqa var-naming
cadvisor_container_labels_traefik_middleware_basic_auth_enabled: false
# See: https://doc.traefik.io/traefik/reference/routing-configuration/http/middlewares/basicauth/
cadvisor_container_labels_traefik_middleware_basic_auth_users: ""

# Controls which additional headers to attach to all HTTP requests.
# To add your own custom request headers, use `cadvisor_container_labels_traefik_additional_request_headers_custom`
cadvisor_container_labels_traefik_additional_request_headers: "{{ cadvisor_container_labels_traefik_additional_request_headers_auto | combine(cadvisor_container_labels_traefik_additional_request_headers_custom) }}"
cadvisor_container_labels_traefik_additional_request_headers_auto: {}
cadvisor_container_labels_traefik_additional_request_headers_custom: {}

# Controls which additional headers to attach to all HTTP responses.
# To add your own custom response headers, use `cadvisor_container_labels_traefik_additional_response_headers_custom`
cadvisor_container_labels_traefik_additional_response_headers: "{{ cadvisor_container_labels_traefik_additional_response_headers_auto | combine(cadvisor_container_labels_traefik_additional_response_headers_custom) }}"
cadvisor_container_labels_traefik_additional_response_headers_auto: |
  {{
    {}
    | combine ({'X-XSS-Protection': cadvisor_http_header_xss_protection} if cadvisor_http_header_xss_protection else {})
    | combine ({'X-Content-Type-Options': cadvisor_http_header_content_type_options} if cadvisor_http_header_content_type_options else {})
    | combine ({'Content-Security-Policy': cadvisor_http_header_content_security_policy} if cadvisor_http_header_content_security_policy else {})
    | combine ({'Permissions-Policy': cadvisor_http_header_permissions_policy} if cadvisor_http_header_permissions_policy else {})
    | combine ({'Strict-Transport-Security': cadvisor_http_header_strict_transport_security} if cadvisor_http_header_strict_transport_security and cadvisor_container_labels_traefik_tls else {})
  }}
cadvisor_container_labels_traefik_additional_response_headers_custom: {}

# cadvisor_container_labels_additional_labels contains a multiline string with additional labels to add to the container label file.
# See `../templates/labels.j2` for details.
# To add your own custom labels, use `cadvisor_container_labels_additional_labels_custom`
#
# Example:
# cadvisor_container_labels_additional_labels_custom:
#   - my.label=1
#   - another.label="here"
cadvisor_container_labels_additional_labels: "{{ cadvisor_container_labels_additional_labels_auto + cadvisor_container_labels_additional_labels_custom }}"
cadvisor_container_labels_additional_labels_auto: []
cadvisor_container_labels_additional_labels_custom: []

# A list of extra arguments to pass to the container (`docker create` command)
cadvisor_container_extra_arguments: "{{ cadvisor_container_extra_arguments_auto + cadvisor_container_extra_arguments_custom }}"
cadvisor_container_extra_arguments_auto: []
cadvisor_container_extra_arguments_custom: []

# A list of extra arguments to pass to the cAdvisor process
# Example: ['--SOME_ARGUMENT']
# See https://github.com/google/cadvisor/blob/master/docs/runtime_options.md for more options
cadvisor_process_extra_arguments: "{{ cadvisor_process_extra_arguments_auto + cadvisor_process_extra_arguments_custom }}"
cadvisor_process_extra_arguments_auto: []
cadvisor_process_extra_arguments_custom: []

# Specifies the value of the `X-XSS-Protection` header
# Stops pages from loading when they detect reflected cross-site scripting (XSS) attacks.
#
# Learn more about it is here:
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-XSS-Protection
# - https://portswigger.net/web-security/cross-site-scripting/reflected
cadvisor_http_header_xss_protection: "1; mode=block"

# Specifies the value of the `X-Content-Type-Options` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/X-Content-Type-Options
cadvisor_http_header_content_type_options: nosniff

# Specifies the value of the `Content-Security-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Content-Security-Policy
cadvisor_http_header_content_security_policy: frame-ancestors 'self'

# Specifies the value of the `Permissions-Policy` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Permissions-Policy
cadvisor_http_header_permissions_policy: "{{ 'interest-cohort=()' if cadvisor_floc_optout_enabled else '' }}"

# Specifies the value of the `Strict-Transport-Security` header.
# See: https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
cadvisor_http_header_strict_transport_security: "max-age=31536000; includeSubDomains{{ '; preload' if cadvisor_hsts_preload_enabled else '' }}"

# Controls whether to send a "Permissions-Policy interest-cohort=();" header along with all responses
#
# Learn more about what it is here:
# - https://www.eff.org/deeplinks/2021/03/googles-floc-terrible-idea
# - https://paramdeo.com/blog/opting-your-website-out-of-googles-floc-network
# - https://amifloced.org/
#
# Of course, a better solution is to just stop using browsers (like Chrome), which participate in such tracking practices.
# See: `cadvisor_http_header_permissions_policy`
cadvisor_floc_optout_enabled: true

# Controls if HSTS preloading is enabled
#
# In its strongest and recommended form, the [HSTS policy](https://www.chromium.org/hsts) includes all subdomains, and
# indicates a willingness to be "preloaded" into browsers:
# `Strict-Transport-Security: max-age=31536000; includeSubDomains; preload`
# For more information visit:
# - https://en.wikipedia.org/wiki/HTTP_Strict_Transport_Security
# - https://developer.mozilla.org/en-US/docs/Web/HTTP/Headers/Strict-Transport-Security
# - https://hstspreload.org/#opt-in
# See: `cadvisor_http_header_strict_transport_security`
cadvisor_hsts_preload_enabled: false

# List of systemd services that the cAdvisor systemd service depends on
cadvisor_systemd_required_services_list: "{{ cadvisor_systemd_required_services_list_default + cadvisor_systemd_required_services_list_auto + cadvisor_systemd_required_services_list_custom }}"
cadvisor_systemd_required_services_list_default: "{{ [devture_systemd_docker_base_docker_service_name] if devture_systemd_docker_base_docker_service_name else [] }}"
cadvisor_systemd_required_services_list_auto: []
cadvisor_systemd_required_services_list_custom: []

# List of systemd services that the cAdvisor systemd service wants
cadvisor_systemd_wanted_services_list: "{{ cadvisor_systemd_wanted_services_list_default + cadvisor_systemd_wanted_services_list_auto + cadvisor_systemd_wanted_services_list_custom }}"
cadvisor_systemd_wanted_services_list_default: []
cadvisor_systemd_wanted_services_list_auto: []
cadvisor_systemd_wanted_services_list_custom: []

# Controls how long to wait for the container to stop gracefully before killing it.
cadvisor_container_stop_grace_time_seconds: "{{ devture_systemd_docker_base_container_stop_grace_time_seconds }}"

# Controls how long the pre-start cleanup should wait for stale container-name release
# before failing startup explicitly.
cadvisor_container_cleanup_timeout_seconds: "{{ devture_systemd_docker_base_container_cleanup_timeout_seconds }}"

# Controls the delay between pre-start cleanup retries.
cadvisor_container_cleanup_retry_delay_seconds: "{{ devture_systemd_docker_base_container_cleanup_retry_delay_seconds }}"

# Shell command used in the systemd pre-start phase to deterministically remove a stale
# container and wait until Docker releases its name.
cadvisor_container_cleanup_command: |
  i=0;
  while [ "$i" -lt {{ cadvisor_container_cleanup_timeout_seconds }} ]; do
  {{ devture_systemd_docker_base_host_command_docker }} stop -t {{ cadvisor_container_stop_grace_time_seconds }} {{ cadvisor_identifier }} >/dev/null 2>&1 || true;
  {{ devture_systemd_docker_base_host_command_docker }} rm -f {{ cadvisor_identifier }} >/dev/null 2>&1 || true;
  if {{ devture_systemd_docker_base_host_command_docker }} container inspect {{ cadvisor_identifier }} >/dev/null 2>&1; then
  i=$((i + 1));
  sleep {{ cadvisor_container_cleanup_retry_delay_seconds }};
  continue;
  fi;
  if {{ devture_systemd_docker_base_host_command_docker }} info >/dev/null 2>&1; then
  exit 0;
  fi;
  echo "Failed to query Docker daemon while cleaning up {{ cadvisor_identifier }}" >&2;
  exit 1;
  done;
  echo "Failed to remove stale container {{ cadvisor_identifier }} after {{ cadvisor_container_cleanup_timeout_seconds }} attempts" >&2;
  exit 1

# Controls the `providers.docker.network` configuration option.
cadvisor_config_providers_docker_network: "{{ devture_traefik_container_network }}"

# Controls the `providers.docker.endpoint` configuration option.
cadvisor_config_providers_docker_endpoint: unix:///var/run/docker.sock

# Specify the timezone
cadvisor_environment_variables_tz: UTC

# Additional environment variables to pass to the cAdvisor container.
# You can use this to further influence the default configuration.
#
# Example:
# cadvisor_environment_variables_additional_variables: |
#   CADVISOR_SOMETHING=true
cadvisor_environment_variables_additional_variables: ""

# cadvisor_dashboard_urls contains a list of URLs with Grafana dashboard definitions for the cadvisor.
# This role doesn't make use of this variable, but you can hook this into other roles.
cadvisor_dashboard_urls:
  - https://grafana.com/api/dashboards/193/revisions/1/download
